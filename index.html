<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy Chat Bot</title>
<style>
:root{
    --bg:#0f172a;
    --panel:#1e293b;
    --user:#2563eb;
    --bot:#334155;
    --text:white;
}
.light{
    --bg:#f1f5f9;
    --panel:white;
    --bot:#e2e8f0;
    --text:black;
}
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:var(--bg);
    color:var(--text);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}
.app{
    width:420px;
    max-width:95%;
    height:720px;
    background:url("ritualll.png") center/contain no-repeat;
    background-color:#0f172a;
    border-radius:20px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:linear-gradient(90deg,#334155,#1e293b);
    color:white;
    font-weight:bold;
    border-bottom:1px solid rgba(255,255,255,0.1);
}
#chat-box{
    flex:1;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
    perspective:800px;
    background:rgba(0, 0, 0, 0.007);
    backdrop-filter:blur(0px);
}
.bubble{
    padding:12px 18px;
    margin:6px 0;
    border-radius:20px;
    max-width:80%;
    word-wrap:break-word;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
    transition:0.3s transform,0.3s box-shadow;
    transform-style: preserve-3d;
    animation:pop 0.35s ease;
}
.bubble:hover{
    transform: rotateY(10deg) scale(1.05);
    box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

body.light .bubble.user { 
    color:white; 
}

body.light .bubble.bot { 
    color:black; 
    background: var(--bot); 
}

body.light input::placeholder { 
    color:#555; 
}


.user { 
    background:var(--user); 
    align-self:flex-end;
     color:white; 
}

.bot { 
    background:var(--bot); 
    align-self:flex-start; 
    color:white; 
}

.bot-wrapper { 
    display:flex; 
    align-items:flex-end; 
    gap:8px; 
}

.bot-avatar { 
    width:28px; 
    height:28px; 
    border-radius:50%; 
    object-fit:cover; 
}

.input-area{
    display:flex;
    padding:10px;
    border-top:1px solid rgba(255,255,255,0.1);
    background:var(--panel);
}
input{
    flex:1;
    padding:12px;
    border-radius:12px;
    border:none;
    outline:none;
    font-size:16px;
}
button.send-btn{
    margin-left:6px;
    padding:0 16px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:var(--user);
    color:white;
    font-weight:bold;
    transition:0.2s;
}
button.send-btn:hover { 
    background:#1d4ed8; 
}

.typing{ 
    display:flex; 
    gap:4px; 
}

.typing span{ 
    width:6px; 
    height:6px; 
    background:white; 
    border-radius:50%; 
    animation:blink 1.4s infinite; 
}

.typing span:nth-child(2){ 
    animation-delay:.2s; 
}

.typing span:nth-child(3){ 
    animation-delay:.4s; 

}
@keyframes blink{ 
    0%,80%,100% {
        opacity:0
    } 
    40% { 
        opacity:1
    } 
}

@keyframes pop{ from {
    opacity:0; 
    transform:scale(.8) translateY(10px); 
} 
    to { 
        opacity:1; 
        transform:scale(1) translateY(0);
    } 
}

#particles {
    position:fixed; 
    top:0; 
    left:0; 
    width:100%; 
    height:100%; 
    pointer-events:none; 
    z-index:-1;
}

.particle {
    position:absolute; 
    width:4px; 
    height:4px; 
    background:#60a5fa; 
    border-radius:50%; 
    opacity:0.7;
    animation:float 10s linear infinite;
}

@keyframes float{ from { 
    transform:translateY(100vh);
    opacity:0;
} 

    50% {
        opacity:1;
}
    to {
        transform:translateY(-10vh);
        opacity:0; 
    } 
}

@media (max-width:600px){ 
    .app{ 
        width:95%; 
        height:95vh; 
    } 
}

.logo { 
    display:flex; 
    align-items:center; 
    gap:8px; 

}

.logo-img { 
    width:30px; 
    height:30px; 
    object-fit:contain; 
}
</style>
</head>

    <h2 class="logo">
    <img src="siggy.png" class="logo-img"> Siggy AI
    </h2>
</header>

<div class="input-area">
        <input id="user-input" placeholder="Ask Siggy...">
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

    // ======================= Chat Logic =======================

// AUTO LANGUAGE DETECTION
function detectLanguage(text){
    const englishwords = ["hi?","who are you?","javascript","python","2+2","coding","fun fact","random advice","am i handsome","am i beautiful","what is ritual","what ritual enables"];
    const tagalogWords = ["hi siggy?","okay lang ako","kamusta?","sino ka?","javascript?","python?","2+2?","coding","fun fact?","random advice?","pogi ba ako?","maganda ba ako?","kupal kaba?"];
    const hindiWords = ["hai siggy?","saya baik-baik saja","Apa kabarmu","siapa kamu","javascripts?","ular sanca?","2+2?","pengkodean?","fakta yang menyenangkan?","saran acak?","Apakah saya benar?","Apakah saya cantik","apa itu ritual?","apa yang dimungkinkan oleh ritual?"];
    const koreanWords = ["안녕 시기?","잘 지내요","어떻게 지내세요","누구세요","자바스크립트?","파이썬?","2+2?","코딩?","재미있는 사실?","무작위 조언?","내가 맞나요?","내가 아름다워?","어떻게 지내세요?","리추얼(Ritual)이란 무엇인가요?","리추얼이 가능하게 하는 것은 무엇인가요?"];
    const lower = text.toLowerCase();
    if(tagalogWords.some(w=>lower.includes(w))) return "tl";
    if(hindiWords.some(w=>lower.includes(w))) return "hi";
    if(koreanWords.some(w=>lower.includes(w))) return "ko";
    return "en";
}

// BUBBLE FUNCTION
function bubble(text,type){
    if(type==="bot"){
        const wrapper=document.createElement("div"); wrapper.classList.add("bot-wrapper");
        const avatar=document.createElement("img"); avatar.src="siggy.png"; avatar.classList.add("bot-avatar");
        const div=document.createElement("div"); div.classList.add("bubble","bot"); div.innerHTML=text.replace(/\n/g,"<br>");
        wrapper.appendChild(avatar);
        wrapper.appendChild(div);
        chatBox.appendChild(wrapper);
    } else {
        const div=document.createElement("div"); div.classList.add("bubble","user"); div.innerHTML=text.replace(/\n/g,"<br>");
        chatBox.appendChild(div);
    }
    while(chatBox.children.length>50) chatBox.removeChild(chatBox.children[0]);
    chatBox.scrollTop = chatBox.scrollHeight;
}

// TYPING DOTS
function showTyping(emoji="💬"){ 
    const wrapper=document.createElement("div"); wrapper.classList.add("bot-wrapper","typing");
    wrapper.id="typingWrapper";
    const avatar=document.createElement("img"); avatar.src="siggy.png"; avatar.classList.add("bot-avatar");
    const emojiDiv=document.createElement("div"); 
    emojiDiv.style.fontSize="20px"; emojiDiv.style.marginRight="4px"; emojiDiv.innerText = emoji;
    const div=document.createElement("div"); div.classList.add("bubble","bot","typing");
    div.innerHTML="<span></span><span></span><span></span>";
    wrapper.appendChild(emojiDiv);
    wrapper.appendChild(avatar); 
    wrapper.appendChild(div);
    chatBox.appendChild(wrapper);
}
function hideTyping(){ 
    const t=document.getElementById("typingWrapper"); if(t) t.remove(); 
}

// SIGGY RESPONSE
function siggyResponse(input){
    const lang = detectLanguage(input);
    const langQnA = qna[lang] || qna["en"];
    for(const key in langQnA){
        if(input.toLowerCase().includes(key)){
            return langQnA[key][0] + " " + langQnA[key][1];
        }
    }
    if(lang==="en") return "Interesting question… Can you explain a bit more?";
    if(lang==="tl") return "Interesting question… Pwede mo bang ipaliwanag pa?";
    if(lang==="hi") return "रोचक सवाल… क्या आप और बता सकते हैं?";
    if(lang==="ko") return "흥미로운 질문이에요… 조금 더 설명해 주실 수 있나요?";
}

// SEND MESSAGE
function sendMessage(){
    const text=input.value.trim(); 
    if(text==="") return;
    bubble(text,"user"); 
    input.value="";

    const replyText = siggyResponse(text);
    const emoji = replyText.match(/[\u{1F300}-\u{1F6FF}\u{1F900}-\u{1F9FF}\u{1F600}-\u{1F64F}]/gu)?.[0] || "💬";
    
    showTyping(emoji);
    setTimeout(()=>{
        hideTyping();
        bubble(replyText,"bot");
    }, 600);
}

// ENTER TO SEND
input.addEventListener("keydown",(e)=>{ 
    if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); sendMessage(); } 
});

// PARTICLES
const particles=document.createElement("div"); 
particles.id="particles"; 
document.body.appendChild(particles);
for(let i=0;i<40;i++){
    const p=document.createElement("div"); 
    p.classList.add("particle");
    p.style.left=Math.random()*100+"%"; 
    p.style.animationDuration=(5+Math.random()*10)+"s";
    particles.appendChild(p);
}

// WELCOME MESSAGE
window.addEventListener("load",()=>{ 
    bubble("👋 Hello boss! I'm Siggy AI. Ask me anything.", "bot"); 
});
        </script>
    </body>

</html>
